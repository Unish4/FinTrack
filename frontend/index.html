<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Title -->
    <title>FinTrack — Personal Finance Tracker & Expense Management App</title>

    <!-- SEO -->
    <meta
      name="description"
      content="FinTrack helps you track expenses, manage budgets, upload receipts, and analyze spending with powerful charts and secure authentication."
    />

    <meta
      name="keywords"
      content="finance tracker, expense tracker, budget app, personal finance, money manager, expense management, react finance app"
    />

    <meta name="author" content="FinTrack" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="FinTrack — Personal Finance Tracker" />

    <meta
      property="og:description"
      content="Track expenses, manage budgets, upload receipts, and visualize spending analytics with FinTrack."
    />

    <meta property="og:type" content="website" />

    <meta property="og:url" content="https://usefinancetrack.vercel.app/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta name="twitter:title" content="FinTrack — Personal Finance Tracker" />

    <meta
      name="twitter:description"
      content="Modern personal finance tracking with analytics and receipt uploads."
    />

    <meta
      name="twitter:image"
      content="https://usefinancetrack.vercel.app/preview.png"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://usefinancetrack.vercel.app/" />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
